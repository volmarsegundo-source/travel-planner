# Dataset: Destination Guide (EVAL-AI-002)
# See: docs/specs/SPEC-EVALS-V1.md §5.1

- description: "GD-01: Piracicaba SP — cidade pequena doméstica pt-BR"
  vars:
    destination: "Piracicaba, SP, Brasil"
    language: "pt-BR"
    tripType: "domestic"
    country: "BR"
    expectedCurrency: "BRL"
    expectedEmergency: ["190", "192", "193"]
  assert:
    - type: javascript
      value: "file://graders/safety.js"
    - type: javascript
      value: "file://graders/accuracy.js"
    - type: javascript
      value: "file://graders/ux.js"
    - type: javascript
      value: "file://graders/i18n.js"

