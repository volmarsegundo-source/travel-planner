# Dataset: Pre-trip Checklist (EVAL-AI-003)
# See: docs/specs/SPEC-EVALS-V1.md §5.3

- description: "CK-01: Bonito doméstico — solo adulto"
  vars:
    destination: "Bonito, MS, Brasil"
    language: "pt-BR"
    tripType: "domestic"
    country: "BR"
    travelers: "1 adulto"
    expectedCurrency: "BRL"
    expectedEmergency: ["190", "192", "193"]
    profile: "solo-adult"
  assert:
    - type: javascript
      value: "file://graders/safety.js"
    - type: javascript
      value: "file://graders/accuracy.js"
    - type: javascript
      value: "file://graders/ux.js"
    - type: javascript
      value: "file://graders/i18n.js"

