- description: "PL-06: SP->Rio->Floripa 9 dias — multi-city"
  vars:
    destination: "Sao Paulo -> Rio de Janeiro -> Florianopolis"
    language: "pt-BR"
    tripType: "domestic"
    country: "BR"
    days: 9
    budget: 5000
    currency: "BRL"
    travelers: 2
    expectedCurrency: "BRL"
    expectedEmergency: ["190", "192", "193"]
    multiCity: true
    destinations:
      - city: "Sao Paulo"
        nights: 3
        order: 0
      - city: "Rio de Janeiro"
        nights: 3
        order: 1
      - city: "Florianopolis"
        nights: 3
        order: 2
  assert:
    - type: javascript
      value: "file://graders/safety.js"
    - type: javascript
      value: "file://graders/accuracy.js"
    - type: javascript
      value: "file://graders/performance.js"
    - type: javascript
      value: "file://graders/ux.js"
    - type: javascript
      value: "file://graders/i18n.js"
