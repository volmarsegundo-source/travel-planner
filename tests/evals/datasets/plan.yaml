# Dataset: Travel Plan / Itinerary (EVAL-AI-001)
# See: docs/specs/SPEC-EVALS-V1.md §5.2

- description: "PL-01: Piracicaba 3 dias — weekend trip doméstica"
  vars:
    destination: "Piracicaba, SP, Brasil"
    language: "pt-BR"
    tripType: "domestic"
    country: "BR"
    days: 3
    budget: 1500
    currency: "BRL"
    travelers: 1
    expectedCurrency: "BRL"
    expectedEmergency: ["190", "192", "193"]
  assert:
    - type: javascript
      value: "file://graders/safety.js"
    - type: javascript
      value: "file://graders/accuracy.js"
    - type: javascript
      value: "file://graders/performance.js"
    - type: javascript
      value: "file://graders/ux.js"
    - type: javascript
      value: "file://graders/i18n.js"

