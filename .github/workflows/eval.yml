name: EDD Eval Gates

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  eval-gates:
    name: EDD Eval Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SKIP_ENV_VALIDATION: "true"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # C-02 (Sprint 46) — `continue-on-error: true` ensures the eval-gate
      # step below is the authoritative PASS/FAIL signal. Previously, a
      # single failing eval test short-circuited the workflow before the
      # gate could apply its threshold, producing an opaque red CI build
      # even when overall pass-rate was well above threshold (Sprint 45
      # retro St-05).
      - name: Run eval suite (writes JSON; failures handled by gate step)
        id: eval-suite
        continue-on-error: true
        run: npx vitest run --config vitest.eval.config.ts --reporter=default --reporter=json --outputFile=eval-report.json

      - name: Eval suite outcome (visibility — gate is authoritative below)
        run: |
          echo "Eval suite step outcome: ${{ steps.eval-suite.outcome }}"
          if [ ! -f eval-report.json ]; then
            echo "::error::eval-report.json was not produced by the eval suite step"
            exit 1
          fi

      - name: Check eval gate (authoritative PASS/FAIL)
        # 24h staleness check is belt-and-braces — the artifact is fresh in
        # this workflow, but enforcing the flag guards against future
        # workflow refactors that might cache or reuse stale artifacts.
        run: npx tsx scripts/eval-gate.ts eval-report.json --threshold=0.8 --max-age-hours=24

      - name: Run drift check
        run: npx tsx scripts/drift-check.ts docs/evals/baselines/v0.22.0-baseline.json eval-report.json --delta=0.1

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.sha }}
          path: eval-report.json
          retention-days: 30
