name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: CODE QUALITY (target: < 3 min)
  # ─────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check

  # ─────────────────────────────────────────
  # STAGE 2: UNIT + INTEGRATION TESTS
  # ─────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: travel_planner
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: travel_planner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://travel_planner:ci_test_password@localhost:5432/travel_planner_test
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci_test_secret_minimum_32_characters_long_ok
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_MAPBOX_TOKEN: pk.test_token
      MAPBOX_SECRET_TOKEN: sk.test_token
      NODE_ENV: test
      SKIP_ENV_VALIDATION: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations (test DB)
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─────────────────────────────────────────
  # STAGE 3: STATIC SECURITY ANALYSIS (SAST)
  # ─────────────────────────────────────────
  sast:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/secrets p/owasp-top-ten"
        continue-on-error: false

  # ─────────────────────────────────────────
  # STAGE 4: DOCKER BUILD + VULNERABILITY SCAN
  # ─────────────────────────────────────────
  build-and-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [test, sast]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t travel-planner:ci .

      - name: Run Trivy vulnerability scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            travel-planner:ci

  # ─────────────────────────────────────────
  # STAGE 5: E2E TESTS (on PR to main only)
  # ─────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.base_ref == 'main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: travel_planner
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: travel_planner_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://travel_planner:ci_test_password@localhost:5432/travel_planner_e2e
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci_e2e_secret_minimum_32_characters_long_here_ok
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_MAPBOX_TOKEN: pk.test_token
      MAPBOX_SECRET_TOKEN: sk.test_token
      NODE_ENV: test
      SKIP_ENV_VALIDATION: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Build Next.js app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
