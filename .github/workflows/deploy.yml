name: Deploy

on:
  push:
    branches: [master, production]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy to production"
        required: true
        type: string

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to staging
        run: echo "Vercel deploys staging automatically via Git integration"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/production') || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy to production
        run: echo "Vercel deploys production automatically via Git integration (branch: production)"

      - name: Verify deployment health
        if: vars.PRODUCTION_URL != ''
        run: |
          echo "Waiting 30s for deployment to propagate..."
          sleep 30
          response=$(curl -sf "https://${{ vars.PRODUCTION_URL }}/api/v1/health" || echo '{"status":"unreachable"}')
          echo "Health check response: $response"
          echo "$response" | grep -q '"status":"ok"' || echo "::warning::Health check did not return ok status"
